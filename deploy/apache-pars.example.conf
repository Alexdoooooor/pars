# Пример для Apache 2.4+ (модули: proxy, proxy_http)
# Включить: a2enmod proxy proxy_http
# Вставить в VirtualHost для aisidora.ru (или Include отдельным файлом).

# ВАЖНО: если уже есть Alias /pars/ на каталог с файлами — уберите его
# или сделайте прокси ПЕРВЫМ и не отдавайте /pars/api из файловой системы.

<Location "/pars/">
    ProxyPass "http://127.0.0.1:8765/pars/"
    ProxyPassReverse "http://127.0.0.1:8765/pars/"
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
</Location>

# Uvicorn: python3 -m uvicorn server.main:app --host 127.0.0.1 --port 8765
# .env: APP_BASE_URL=/pars
