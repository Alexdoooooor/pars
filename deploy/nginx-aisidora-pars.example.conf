# =============================================================================
# Nginx: весь каталог /pars/ → uvicorn (и HTML, и /pars/api/…)
# =============================================================================
# Uvicorn: python3 -m uvicorn server.main:app --host 127.0.0.1 --port 8765
# .env на сервере: APP_BASE_URL=/pars
#
# НЕ используйте одновременно для /pars/ и alias на диск, и этот proxy —
# иначе /pars/api/ снова даст 404.
#
# Вставьте внутрь server { ... } вашего виртуального хоста aisidora.ru

location /pars/ {
    proxy_pass http://127.0.0.1:8765/pars/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # при длинных ответах API
    proxy_read_timeout 120s;
}

