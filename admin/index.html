<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход · Сценарии Price Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <style>
    .login-wrap { max-width: 400px; margin: 10vh auto; padding: var(--space-8); }
    .login-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-xl); padding: var(--space-8); box-shadow: var(--shadow-md); }
    .login-card h1 { font-family: var(--font-display); font-size: var(--text-xl); margin-bottom: var(--space-2); }
    .login-card p { color: var(--color-text-muted); font-size: var(--text-sm); margin-bottom: var(--space-6); }
    .form-group { margin-bottom: var(--space-4); }
    .form-group label { display: block; font-size: var(--text-xs); font-weight: 600; color: var(--color-text-muted); margin-bottom: var(--space-2); text-transform: uppercase; letter-spacing: 0.06em; }
    .form-group input { width: 100%; padding: var(--space-3) var(--space-4); border-radius: var(--radius-md); border: 1px solid var(--color-border); font: inherit; background: var(--color-surface); color: var(--color-text); }
    .form-err { color: var(--color-error); font-size: var(--text-sm); margin-top: var(--space-3); }
    .back-link { display: inline-block; margin-top: var(--space-6); font-size: var(--text-sm); color: var(--color-primary); }
  </style>
</head>
<body style="overflow:auto;height:auto;min-height:100dvh;display:block;background:var(--color-bg);">
  <div class="login-wrap">
    <div class="login-card">
      <h1>Админка сценариев</h1>
      <p>Логин и пароль из .env (ADMIN_USERNAME / ADMIN_PASSWORD)</p>
      <form id="login-form">
        <div class="form-group">
          <label for="u">Логин</label>
          <input id="u" name="u" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="p">Пароль</label>
          <input id="p" name="p" type="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-primary" style="width:100%;justify-content:center;border:none;cursor:pointer;">Войти</button>
        <div id="err" class="form-err" style="display:none"></div>
      </form>
      <a class="back-link" href="../index.html">← На главную дашборда</a>
    </div>
  </div>
  <script>
  document.getElementById('login-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var u = document.getElementById('u').value.trim();
    var p = document.getElementById('p').value;
    var err = document.getElementById('err');
    err.style.display = 'none';
    try {
      sessionStorage.setItem('pi_basic', btoa(unescape(encodeURIComponent(u + ':' + p))));
    } catch (ex) {
      err.textContent = 'Не удалось закодировать логин/пароль';
      err.style.display = 'block';
      return;
    }
    window.location.href = 'dashboard.html';
  });
  </script>
</body>
</html>
