<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Аналитика · Price Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { overflow: auto; height: auto; min-height: 100dvh; display: block; background: var(--color-bg); }
    .admin-top { background: var(--color-surface); border-bottom: 1px solid var(--color-border); padding: var(--space-5) var(--space-8); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: var(--space-4); }
    .admin-top h1 { font-family: var(--font-display); font-size: var(--text-xl); }
    .admin-wrap { padding: var(--space-8); max-width: 1000px; margin: 0 auto; }
    .btn-secondary { background: var(--color-surface-offset); color: var(--color-text); font-weight: 600; font-size: var(--text-sm); padding: var(--space-3) var(--space-6); border-radius: var(--radius-md); border: 1px solid var(--color-border); cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: var(--space-4); margin-bottom: var(--space-8); }
    .stat-box { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-6); box-shadow: var(--shadow-sm); }
    .stat-box .v { font-family: var(--font-display); font-size: var(--text-2xl); font-weight: 700; color: var(--vtb-navy); }
    .stat-box .k { font-size: var(--text-xs); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: var(--space-2); }
    .alert { padding: var(--space-4); border-radius: var(--radius-md); background: var(--color-error-bg); color: var(--color-error); font-size: var(--text-sm); display: none; margin-bottom: var(--space-4); }
    .alert.show { display: block; }
    pre { background: var(--color-surface-offset); padding: var(--space-4); border-radius: var(--radius-md); font-size: var(--text-xs); overflow: auto; }
  </style>
</head>
<body>
  <header class="admin-top">
    <div>
      <h1>Аналитика</h1>
      <div style="font-size:var(--text-sm);color:var(--color-text-muted);">Сводка по сценариям и прогонам (только для админов)</div>
    </div>
    <div style="display:flex;gap:var(--space-3);flex-wrap:wrap;">
      <a href="scenarios.html" class="btn-secondary">Сценарии</a>
      <a href="automation.html" class="btn-secondary">Автоматизация</a>
      <a href="index.html" class="btn-secondary">Выход / смена пользователя</a>
    </div>
  </header>
  <div class="admin-wrap">
    <div id="alert" class="alert"></div>
    <div class="stat-grid" id="stats"></div>
    <div class="card">
      <div class="card-header"><div class="card-title">Статусы сценариев</div></div>
      <div class="card-body"><pre id="by-status">—</pre></div>
    </div>
  </div>
  <script src="../api/public-config.js"></script>
  <script src="../js/pi-api.js"></script>
  <script>
  if (!sessionStorage.getItem('pi_basic')) location.href = 'index.html';
  async function load() {
    var a = document.getElementById('alert');
    a.classList.remove('show');
    try {
      var s = await PIApi.api('/api/analytics/summary', { method: 'GET' });
      var g = document.getElementById('stats');
      g.innerHTML =
        box('Сценариев', s.scenarios_total) +
        box('Всего прогонов', s.runs_total) +
        box('Прогонов за 24 ч', s.runs_last_24h) +
        box('Успешных за 24 ч', s.runs_success_last_24h) +
        box('Ошибок за 24 ч', s.runs_error_last_24h) +
        box('Режим парсера', s.parser_mode);
      document.getElementById('by-status').textContent = JSON.stringify(s.scenarios_by_status, null, 2);
    } catch (e) {
      if (String(e.message) === '401') location.href = 'index.html';
      a.textContent = e.message || 'Ошибка';
      a.classList.add('show');
    }
  }
  function box(k, v) {
    return '<div class="stat-box"><div class="v">' + escapeHtml(String(v)) + '</div><div class="k">' + escapeHtml(k) + '</div></div>';
  }
  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  load();
  </script>
</body>
</html>
