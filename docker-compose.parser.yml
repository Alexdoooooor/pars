# Опционально: два процесса из одного каталога с общим .env
# docker compose -f docker-compose.parser.yml up
#
# На хосте в .env должны быть: PARSER_SERVICE_API_KEY, PARSER_SERVICE_URL=http://parser:8810
# и для основного приложения тот же ключ.

services:
  parser:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install -q -r requirements.txt &&
      uvicorn parser_service.main:app --host 0.0.0.0 --port 8810"
    ports:
      - "8810:8810"
    env_file:
      - .env

